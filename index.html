<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Firstay 1000</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; margin: 0; touch-action: manipulation; }
        .checkout-badge { font-size: 8px; font-weight: 900; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-10">
        <div class="bg-orange-600 text-white p-10 rounded-b-[40px] shadow-lg text-center relative">
            <div class="flex justify-between items-center px-4">
                <button onclick="changeMonth(-1)" class="p-2"><i class="fas fa-chevron-left text-2xl"></i></button>
                <h2 id="month-title" class="text-3xl font-black">2026년 4월</h2>
                <button onclick="changeMonth(1)" class="p-2"><i class="fas fa-chevron-right text-2xl"></i></button>
            </div>
            <button onclick="init()" class="mt-4 bg-white/20 px-4 py-1.5 rounded-full text-[11px] font-bold border border-white/30 active:scale-95 transition-all">
                <i class="fas fa-sync-alt mr-1"></i> 시트 데이터 강제 연동
            </button>
        </div>
        <div class="p-6"><div id="calendar-grid" class="grid grid-cols-7 gap-3"></div></div>
        <div id="memo-modal" class="fixed inset-0 bg-black/70 hidden flex items-end z-50">
            <div class="bg-white w-full rounded-t-[40px] p-8 pb-12 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="memo-date" class="text-2xl font-bold">날짜 메모</h3>
                    <button onclick="closeModal()" class="text-3xl text-gray-400">&times;</button>
                </div>
                <textarea id="memo-input" class="w-full h-48 p-5 border-2 border-orange-100 rounded-[25px] outline-none focus:border-orange-500 text-lg"></textarea>
                <button id="save-btn" onclick="saveMemo()" class="w-full bg-orange-600 text-white font-black py-5 rounded-[25px] mt-6 text-xl shadow-lg">저장하기</button>
            </div>
        </div>
    </div>
    <script>
        // 릴리님의 최신 구글 주소
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwlRXjKX4fXzy1qN-aWshziJZP6GxoU3F8tq_7_9QEcOcEM9M3mv-ZI4c4yP53r3RUjQ/exec";
        let currentMonth = new Date();
        let checkoutDates = [];
        let allMemos = {};

        async function init() {
            renderCalendar(); 
            try {
                // [핵심] 구글 시트에서 데이터를 가져올 때 '새 주소'인 척 속여서 최신 데이터를 긁어옵니다.
                const timestamp = Date.now();
                const memoRes = await fetch(`${WEB_APP_URL}?t=${timestamp}`);
                allMemos = await memoRes.json();
                
                const calRes = await fetch('/api/calendar?t=' + timestamp);
                checkoutDates = await calRes.json();
                renderCalendar();
            } catch (e) { console.error(e); }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('month-title');
            grid.innerHTML = '';
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            title.innerText = `${year}년 ${month + 1}월`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isCheckout = checkoutDates.includes(dateStr);
                const memo = allMemos[dateStr];
                const dayEl = document.createElement('div');
                dayEl.className = `relative h-16 flex items-center justify-center rounded-2xl shadow-sm text-lg font-bold cursor-pointer ${isCheckout ? 'bg-orange-500 text-white' : 'bg-white text-gray-700'}`;
                dayEl.innerHTML = `<div class="flex flex-col items-center"><span>${d}</span>${isCheckout ? '<span class="checkout-badge">CHECKOUT</span>' : ''}${memo ? '<div class="w-1.5 h-1.5 bg-orange-300 rounded-full mt-0.5"></div>' : ''}</div>`;
                dayEl.onclick = () => openModal(dateStr);
                grid.appendChild(dayEl);
            }
        }

        let selectedDate = "";
        function openModal(dateStr) {
            selectedDate = dateStr;
            const parts = dateStr.split('-');
            document.getElementById('memo-date').innerText = `${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
            document.getElementById('memo-input').value = allMemos[dateStr] || "";
            document.getElementById('memo-modal').classList.remove('hidden');
        }

        async function saveMemo() {
            const content = document.getElementById('memo-input').value;
            const btn = document.getElementById('save-btn');
            btn.innerText = "저장 중..."; btn.disabled = true;
            try {
                // 일단 앱 화면에 즉시 반영
                allMemos[selectedDate] = content;
                renderCalendar();
                // 시트로 전송
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ date: selectedDate, content: content }) });
                setTimeout(() => { closeModal(); btn.innerText = "저장하기"; btn.disabled = false; }, 300);
            } catch (e) { alert("저장 실패"); btn.disabled = false; btn.innerText = "저장하기"; }
        }

        function closeModal() { document.getElementById('memo-modal').classList.add('hidden'); }
        function changeMonth(diff) { currentMonth.setMonth(currentMonth.getMonth() + diff); init(); }
        init();
    </script>
</body>
</html>
